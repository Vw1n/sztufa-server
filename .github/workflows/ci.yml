name: 服务端持续集成

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 测试、检查与构建
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装锁定依赖
        run: npm ci

      - name: 检查高危依赖漏洞
        run: npm audit --audit-level=high

      - name: 运行代码检查
        run: npm run lint:check

      - name: 运行测试
        run: npm test -- --runInBand

      - name: 生成生产构建
        run: npm run build
