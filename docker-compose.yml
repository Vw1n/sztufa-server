version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sztu-fa-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sztu_fa
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sztu-fa-api
    environment:
      PORT: 3000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/sztu_fa?schema=public"
      JWT_SECRET: "sztu-fa-jwt-secret-key-change-in-production"
      JWT_EXPIRES_IN: "3600s"
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
